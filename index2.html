<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="estilo.css">
</head>
<body>
 <a href="index.html">index 1</a>
        <a href="index4.html">index 3</a>
      
        <div class="contenido">
            <h1>📧 Formulario de Carga</h1>
            
            <div class="formulario-seccion">
                <h2>Input de Email y Contraseña</h2>
                <div class="input-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com">
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
            </div>

            <div class="archivo-seccion">
                <h2>📄 Cargar Archivo de Texto (.txt)</h2>
                <div class="input-group">
                    <input type="file" id="archivoTxt" accept=".txt">
                </div>
                <button onclick="cargarArchivo()" class="btn-cargar">Cargar y Mostrar</button>
            </div>

            <div class="resultados">
                <h3>📊 Datos en Consola y Página:</h3>
                <div id="infoUsuario" class="info-box">
                    <p><strong>Email:</strong> <span id="emailDisplay">No ingresado</span></p>
                    <p><strong>Password:</strong> <span id="passDisplay">No ingresado</span></p>
                </div>
                <div id="contenidoArchivo" class="archivo-box">
                    <h4>Contenido del archivo:</h4>
                    <pre id="textoArchivo">Esperando archivo...</pre>
                </div>
            </div>
        </div>
    </div>

</body>
<script src="script2.js"></script>
</html>
