        <div class="contenido">
            <h1>📅 Calendario y Visualizador PDF</h1>
            
            <div class="seccion-calendario">
                <h2>Seleccionar Fecha</h2>
                <div class="input-fecha">
                    <input type="date" id="fechaInput">
                    <button onclick="mostrarFecha()" class="btn-fecha">Confirmar Fecha</button>
                </div>
                <div id="infoFecha" class="info-fecha">
                    <p>Fecha seleccionada: <span id="fechaDisplay">Ninguna</span></p>
                    <p>Día de la semana: <span id="diaSemana">-</span></p>
                </div>
            </div>

            <div class="seccion-pdf">
                <h2>📄 Cargar y Visualizar PDF</h2>
                <div class="input-pdf">
                    <input type="file" id="pdfInput" accept=".pdf">
                    <button onclick="cargarPDF()" class="btn-pdf">Cargar PDF</button>
                </div>
                <div id="visorPDF" class="visor-pdf">
                    <p class="mensaje-default">El PDF se mostrará aquí...</p>
                </div>
            </div>
        </div>
    </div>
</body>
