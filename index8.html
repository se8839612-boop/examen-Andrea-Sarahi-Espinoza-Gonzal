<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
      <a href="index7.html">index 3</a>
        <a href="index.html">index 3</a>
          <div class="contenido">
            <h1>🛒 Catálogo de Productos</h1>
            
            <div class="panel-control">
                <div class="filtro-rango">
                    <h3>💰 Filtrar por Precio</h3>
                    <div class="rango-container">
                        <div class="input-rango">
                            <label>Min: $<span id="valorMin">0</span></label>
                            <input type="range" id="rangoMin" min="0" max="1000" value="0" step="10">
                        </div>
                        <div class="input-rango">
                            <label>Max: $<span id="valorMax">1000</span></label>
                            <input type="range" id="rangoMax" min="0" max="1000" value="1000" step="10">
                        </div>
                    </div>
                    <div class="barra-visual" id="barraVisual"></div>
                </div>
                
                <div class="filtros-adicionales">
                    <h3>🏷️ Categorías</h3>
                    <div class="checkbox-group">
                        <label><input type="checkbox" class="cat-filter" value="electronica" checked> Electrónica</label>
                        <label><input type="checkbox" class="cat-filter" value="hogar" checked> Hogar</label>
                        <label><input type="checkbox" class="cat-filter" value="ropa" checked> Ropa</label>
                        <label><input type="checkbox" class="cat-filter" value="deportes" checked> Deportes</label>
                        <label><input type="checkbox" class="cat-filter" value="libros" checked> Libros</label>
                    </div>
                </div>
                
                <div class="ordenar">
                    <h3>📊 Ordenar</h3>
                    <select id="ordenarSelect">
                        <option value="default">Por defecto</option>
                        <option value="precio-asc">Precio: Menor a Mayor</option>
                        <option value="precio-desc">Precio: Mayor a Menor</option>
                        <option value="nombre">Nombre A-Z</option>
                    </select>
                </div>
            </div>

            <div class="estadisticas-top">
                <span id="contadorProductos">Mostrando 0 de 55 productos</span>
                <button onclick="resetFiltros()" class="btn-reset">🔄 Resetear Filtros</button>
            </div>

            <div class="grid-productos" id="gridProductos">
                <!-- Productos generados por JS -->
            </div>
            
            <div class="paginacion">
                <button onclick="cambiarPagina(-1)" id="btnPrev">← Anterior</button>
                <span id="infoPagina">Página 1 de 6</span>
                <button onclick="cambiarPagina(1)" id="btnNext">Siguiente →</button>
            </div>
        </div>
    </div>
</body>
<script src="script8.js"></script>
</html>
