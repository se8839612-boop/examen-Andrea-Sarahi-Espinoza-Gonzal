<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
      <a href="index3.html">index 3</a>
        <a href="index5.html">index 3</a>
         <div class="contenido">
            <h1>🎨 Cargador de Multimedia</h1>
            
            <div class="grid-inputs">
                <div class="input-card color-card">
                    <h3>🎨 Selector de Color</h3>
                    <input type="color" id="colorInput" value="#ff6b6b">
                    <div id="colorPreview" class="preview-box"></div>
                    <p id="colorValue">#ff6b6b</p>
                </div>

                <div class="input-card">
                    <h3>🖼️ Cargar Imagen</h3>
                    <input type="file" id="imagenInput" accept="image/*">
                    <div id="imagenPreview" class="media-preview">
                        <span>Vista previa de imagen</span>
                    </div>
                </div>

                <div class="input-card">
                    <h3>🎵 Cargar Audio</h3>
                    <input type="file" id="audioInput" accept="audio/*">
                    <div id="audioContainer" class="media-container">
                        <p>El reproductor aparecerá aquí</p>
                    </div>
                </div>

                <div class="input-card">
                    <h3>🎬 Cargar Video</h3>
                    <input type="file" id="videoInput" accept="video/*">
                    <div id="videoContainer" class="media-container video-box">
                        <p>El video aparecerá aquí</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script4.js"></script>
</html>
